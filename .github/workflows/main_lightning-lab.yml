# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy container app to Azure Web App - lightning-lab

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: testing
        run: |
          docker run \
            --rm \
            -u $(id -u):$(id -g) \
            -e DOTNET_CLI_HOME=/tmp/dotnet-home \
            -e HOME=/tmp \
            -e NUGET_PACKAGES=/tmp/nuget-packages \
            -v .:/app \
            -w /app \
            mcr.microsoft.com/dotnet/sdk:10.0 \
              dotnet test --no-restore tests/tests.csproj

  build:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to container registry
        uses: docker/login-action@v2
        with:
          registry: docker.io/
          username: ${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_528C556FE4AC46BEBC781B151D0DD92C }}
          password: ${{ secrets.AZUREAPPSERVICE_CONTAINERPASSWORD_E618612877ED45599BC2CE0BE1F566CF }}

      - name: Build and push container image to registry
        uses: docker/build-push-action@v3
        with:
          context: .
          push: true
          tags: docker.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_528C556FE4AC46BEBC781B151D0DD92C }}/lightning-lab:${{ github.sha }}
          file: ./Dockerfile

  deploy:
    runs-on: ubuntu-latest
    
    needs: build
    
    steps:
      
      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'lightning-lab'
          slot-name: 'Production'
          images: 'docker.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_528C556FE4AC46BEBC781B151D0DD92C }}/lightning-lab:${{ github.sha }}'
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_A4C714152C1143049D87BD58E6E3D155 }}